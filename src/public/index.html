<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>PouchDB Sync</title>
        <script type="text/javascript" src="rede.js"></script>

        <script src="https://cdn.jsdelivr.net/npm/pouchdb/dist/pouchdb.min.js"></script>
    </head>

    <body>
        <button onclick="login()">Login</button>

        <button onclick="sincronizar()">Sincronizar</button>

        <button onclick="configura()">Inicia Semestre</button>

        <script>
            const nomesDisciplinas = new PouchDB("lista");
            var listaDisciplinas = [];
            var token = "";

            async function obtemListaBDlocal() {
                let result = await nomesDisciplinas.allDocs({ include_docs: true });
                try {
                    return result.rows[0].doc.lista;
                } catch (e) {
                    return [];
                }
            }

            async function removeBDlocais(lista) {
                if (!lista) return;
                for (let a = 0; a < lista.length; a++) {
                    try {
                        let db = new PouchDB(lista[a]);
                        await db.destroy();
                    } catch (e) {
                        console.log("Erro removendo: " + lista[a]);
                    }
                }
            }

            async function dadosDisciplina(nome) {
                return await GET("/disciplinas/" + nome);
            }

            async function qtdDisciplinas() {
                try {
                    let resultado = await nomesDisciplinas.allDocs({ include_docs: true });
                    let l = resultado.rows[0].doc.lista;
                    console.log("Disciplinas locais: " + l.length);
                    for (let a = 0; a < l.length; a++) console.log(l[a]);
                } catch (e) {}
            }

            async function atualizaLista(lista) {
                let doc = { _id: "0", lista: lista };
                try {
                    const existente = await nomesDisciplinas.get(doc._id);
                    doc._rev = existente._rev;
                    await nomesDisciplinas.put(doc);
                } catch (err) {
                    if (err.status === 404) {
                        await nomesDisciplinas.put(doc);
                    } else {
                        console.error(err);
                    }
                }
            }

            async function criaBancoDados(bd, dados) {
                const db = new PouchDB(bd);
                listaDisciplinas.push(db);
                if (!dados || dados.length === 0) return;
                for (let a = 0; a < dados.length; a++) {
                    const doc = {
                        _id: dados[a].aluno,
                        aluno: dados[a].aluno,
                        aulas: dados[a].aulas || [],
                    };
                    try {
                        const existente = await db.get(doc._id);
                        doc._rev = existente._rev;
                        await db.put(doc);
                    } catch (err) {
                        if (err.status === 404) {
                            await db.put(doc);
                        }
                    }
                }
            }

            async function obtemListaDisciplinasServidor() {
                try {
                    return await GET("/disciplinas");
                } catch (e) {
                    console.log("Erro: " + e);
                    return [];
                }
            }

            async function configura() {
                let lista = await obtemListaDisciplinasServidor();
                if (lista && lista.length > 0) {
                    let x = await obtemListaBDlocal();
                    await removeBDlocais(x);
                    await atualizaLista(lista);
                    console.log("Lista recebida: " + lista);
                    for (let a = 0; a < lista.length; a++) {
                        let dados = await dadosDisciplina(lista[a]);
                        await criaBancoDados(lista[a], dados);
                    }
                    qtdDisciplinas();
                } else {
                    console.log("Sem acesso ao sistema ou lista vazia");
                }
            }

            async function login() {
                const dados = await POST("/login", {
                    email: "fabio@ufsc.br",
                    senha: "123",
                });
                token = dados.token;
                localStorage.setItem("token", token);
                console.log("TOKEN:", token);
            }

            async function sincronizar() {
                token = token || localStorage.getItem("token");
                if (!token) {
                    console.log("Faca login primeiro");
                    return;
                }
                const listaBDs = await obtemListaBDlocal();
                if (!listaBDs || listaBDs.length === 0) {
                    console.log("Nenhuma disciplina local");
                    return;
                }
                for (let a = 0; a < listaBDs.length; a++) {
                    const db = new PouchDB(listaBDs[a]);
                    const result = await db.allDocs({ include_docs: true });
                    const docs = result.rows.map((r) => r.doc);
                    if (docs.length === 0) continue;
                    try {
                        const resposta = await fetch("/sync/" + listaBDs[a], {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                                "Authorization": "Bearer " + token,
                            },
                            body: JSON.stringify({ docs }),
                        });
                        if (resposta.status === 401) {
                            console.log("Sessao expirada, faca login novamente");
                            localStorage.removeItem("token");
                            token = "";
                            return;
                        }
                        console.log(listaBDs[a] + ": " + await resposta.text());
                    } catch (e) {
                        console.log("Sem conexao para " + listaBDs[a]);
                    }
                }
            }

            token = localStorage.getItem("token") || "";
            qtdDisciplinas();
        </script>
    </body>
</html>
